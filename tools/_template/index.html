<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Name</title>
  <link rel="stylesheet" href="../../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../../assets/css/skins/canva-dark.css" />
  <link rel="stylesheet" href="../../../assets/css/user.css" />
  <script src="../../../assets/js/layout.shell.js" defer></script>
</head>
<body class="tool-shell-page theme-dark">
  <wt-tool-shell
    class="ui-page ui-stack"
    eyebrow="Category"
    heading="Tool Name"
    lede="Replace this with a one-line description of what the tool does."
    back-href="../../../index.html"
    aria-label="Tool template page"
  >
    <div class="tool-shell-grid ui-grid-2">
      <section class="tool-panel ui-panel ui-stack" aria-labelledby="main-ui">
        <h2 id="main-ui">Main UI</h2>
        <p>Build your tool interface here.</p>
      </section>

      <section class="tool-panel ui-panel ui-stack" aria-labelledby="tool-meta">
        <h2 id="tool-meta">Tool Meta</h2>
        <p class="code-chip ui-code-chip">Alias: t/&lt;alias&gt;/</p>
        <p class="code-chip ui-code-chip">Source: tools/&lt;category&gt;/&lt;slug&gt;/</p>
        <p>Update <code>assets/js/tools.registry.js</code>. The Go server resolves <code>/t/&lt;alias&gt;/</code> dynamically; no alias stub page is needed.</p>
      </section>
    </div>
  </wt-tool-shell>
</body>
</html>
