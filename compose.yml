services:
  tfdl:
    build:
      context: .
      dockerfile: Dockerfile
    image: tfdl-workspace:local
    working_dir: /srv/tfdl
    command:
      - serve
      - -config
      - /srv/tfdl/tfdl.example.json
      - -root
      - /srv/tfdl
      - -port
      - ${TFDL_PORT:-8080}
    environment:
      TFDL_AUTH_ENABLED: ${TFDL_AUTH_ENABLED:-}
      TFDL_AUTH_USER: ${TFDL_AUTH_USER:-}
      TFDL_AUTH_PASS: ${TFDL_AUTH_PASS:-}
    volumes:
      - ./:/srv/tfdl:ro
    ports:
      - "${TFDL_PORT:-8080}:${TFDL_PORT:-8080}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${TFDL_PORT:-8080}/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
