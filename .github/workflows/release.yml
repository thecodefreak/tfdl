name: Release

on:
  push:
    tags:
      - "release-v*"

permissions:
  contents: write
  packages: write

env:
  TAG_PREFIX: release-v
  GO_VERSION_FILE: go.mod
  APP_NAME: tfdl

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prefix="${TAG_PREFIX}"
          
          if [[ "${tag}" != "${prefix}"* ]]; then
            echo "Tag '${tag}' does not match expected prefix '${prefix}'" >&2
            exit 1
          fi
          
          version="${tag#${prefix}}"
          if [[ -z "${version}" ]]; then
            echo "Parsed version is empty for tag '${tag}'" >&2
            exit 1
          fi
          
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release binary (${{ matrix.goos }}/${{ matrix.goarch }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          
          version="${{ steps.version.outputs.version }}"
          build_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          
          # Determine output filename
          output_name="${APP_NAME}_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            output_name="${output_name}.exe"
          fi
          
          # Build
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
            -ldflags="-s -w -X main.version=${version} -X main.buildTime=${build_time}" \
            -o "dist/${output_name}" ./cmd/tfdl
          
          # Make executable (no-op on some platforms, but safe)
          chmod +x "dist/${output_name}" || true
          
          echo "Built: ${output_name}"
          ls -lh dist/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          prefix="${TAG_PREFIX}"

          if [[ "${tag}" != "${prefix}"* ]]; then
            echo "Tag '${tag}' does not match expected prefix '${prefix}'" >&2
            exit 1
          fi

          version="${tag#${prefix}}"
          if [[ -z "${version}" ]]; then
            echo "Parsed version is empty for tag '${tag}'" >&2
            exit 1
          fi

          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${repo_lc}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

          if [[ "${version}" == *-* ]]; then
            echo "docker_tags=${image}:${version}" >> "${GITHUB_OUTPUT}"
          else
            {
              echo "docker_tags<<EOF"
              echo "${image}:${version}"
              echo "${image}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.docker_tags }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          prefix="${TAG_PREFIX}"

          if [[ "${tag}" != "${prefix}"* ]]; then
            echo "Tag '${tag}' does not match expected prefix '${prefix}'" >&2
            exit 1
          fi

          version="${tag#${prefix}}"
          if [[ -z "${version}" ]]; then
            echo "Parsed version is empty for tag '${tag}'" >&2
            exit 1
          fi

          src_asset="${APP_NAME}_${version}_source.tar.gz"
          checksum_asset="SHA256SUMS.txt"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "src_asset=${src_asset}" >> "${GITHUB_OUTPUT}"
          echo "checksum_asset=${checksum_asset}" >> "${GITHUB_OUTPUT}"

          if [[ "${version}" == *-* ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lh dist/

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          git archive \
            --format=tar.gz \
            --prefix="${APP_NAME}-${{ steps.vars.outputs.version }}/" \
            --output="dist/${{ steps.vars.outputs.src_asset }}" \
            HEAD

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > "${{ steps.vars.outputs.checksum_asset }}"
          echo "Checksums:"
          cat "${{ steps.vars.outputs.checksum_asset }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ env.APP_NAME }} ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.vars.outputs.is_prerelease }}
          files: dist/*
